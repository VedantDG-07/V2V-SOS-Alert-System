<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - V2V SOS</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div id="flashMessage" class="flash-message hidden"></div>
    <div class="auth-container">
      <div class="auth-card">
        <h2>Login</h2>

        <input id="loginEmail" type="email" placeholder="Email" />
        <input id="loginPassword" type="password" placeholder="Password" />

        <button id="loginBtn">Login</button>

        <div
          style="
            margin-top: 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 16px;
          "
        >
          <p style="font-size: 13px; color: #94a3b8; margin-bottom: 10px">
            Or continue as
          </p>
          <button
            id="guestBtn"
            style="
              background: rgba(255, 255, 255, 0.08);
              border: 1px solid rgba(255, 255, 255, 0.1);
            "
          >
            Continue as Guest
          </button>
          <p style="font-size: 12px; color: #64748b; margin-top: 8px">
            Guest data will be deleted on browser close
          </p>
        </div>

        <p>
          New user?
          <a style="text-decoration: none" href="register.html">Register</a>
        </p>

      </div>
    </div>

    <script type="module" src="firebase-config.js"></script>
    <script type="module" src="app.js"></script>
  </body>
</html>
