<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - V2V SOS</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

</head>

<body>
  <div id="flashMessage" class="flash-message hidden"></div>
  <div class="auth-container">
    <div class="auth-card">
    <h2>Create Account</h2>

    <input id="regEmail" type="email" placeholder="Email">
    <input id="regPassword" type="password" placeholder="Password">
    <input id="regVehicle" placeholder="Vehicle Name">
    <input id="regPlate" placeholder="Vehicle Number Plate">

    <button id="registerBtn">Register</button>

    <p>Already have account? <a href="login.html">Login</a></p>
  </div>
</div>

<script type="module" src="firebase-config.js"></script>
<script type="module" src="app.js"></script>

</body>
</html>
