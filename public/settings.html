<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>V2V Settings</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>

<body>

<div class="container">

  <!-- HEADER -->
  <header>
    <div class="hamburger" id="hamburger">
      <button style="margin:0">☰</button>
    </div>
    <h1>V2V Emergency Alert</h1>
    <div class="box">
    <nav>
        <a href="index.html">Dashboard</a>
        <a href="map.html">Map</a>
        <a href="history.html">Alert History</a>
        <a href="services.html">Services</a>
        <a href="settings.html">Settings</a>
      </nav>
      <button style="margin-top: 0;" onclick="logoutUser()">Logout</button>
    </div>
  </header>
  <!-- FLASH MESSAGE -->
  <div id="flashMessage" class="flash-message hidden"></div>

  <div class="main single-column">

    <!-- ACCOUNT STATUS -->
    <div class="card">
      <h2>Account Status</h2>

      <p><strong>User ID:</strong> <span id="vehicleId">---</span></p>
      <p><strong>Account Type:</strong> <span id="accountType">Anonymous</span></p>

      <button onclick="logoutUser()">Logout</button>

      <!-- ACCOUNT SETUP SECTION -->
      <div id="setupAccountSection" class="setup-section">
        <h3>Complete Account Setup</h3>

        <input id="setupName" placeholder="Full Name">
        <input id="setupEmail" type="email" placeholder="Email">
        <input id="setupPassword" type="password" placeholder="Password">
        <input id="setupVehicle" placeholder="Vehicle Name">
        <input id="setupPlate" placeholder="Vehicle Number Plate">

        <button id="completeSetupBtn">
          Complete Setup
        </button>
      </div>

    </div>

    <!-- EMERGENCY CONTACTS -->
    <div class="card">
      <h2>Emergency Contacts</h2>

      <p id="contactLockMsg" class="locked-msg">
        Complete account setup to enable emergency contacts.
      </p>

      <div id="contactSection" class="hidden">
        <input id="contactInput" placeholder="Enter Phone Number">
        <button id="addContactBtn">Add Contact</button>

        <ul id="contactList" class="history-list"></ul>
      </div>
    </div>

  </div>

  <footer>
    Smart Vehicle Safety • Real-Time Emergency Communication
  </footer>

</div>

<script type="module" src="firebase-config.js"></script>
<script type="module" src="app.js"></script>

</body>
</html>
